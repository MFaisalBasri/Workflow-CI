name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLProject/Dataset_olist_preprocessing.csv"
  TARGET_VAR: "is_late"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL
      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0
          
      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local 

      - name: Show model conda
        run: |
          find mlruns -name conda.yaml -exec cat {} \;
      
      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Debug MLflow Files
        run: |
          echo "=== RUN_ID ==="
          echo $RUN_ID
      
          echo "=== MLRUNS ==="
          find mlruns -type f | head -100
      
          echo "=== DIRECTORY STRUCTURE ==="
          find mlruns -type d | head -100

      - name: Prepare Model Artifact
        run: |
          mkdir -p deploy
      
          MODEL_PATH=$(find mlruns -type d -path "*/artifacts/model" | head -n 1)
      
          echo "Found model:"
          echo $MODEL_PATH
      
          cp -r "$MODEL_PATH" deploy/model
      
          ls -R deploy
          
      # Build Docker Model
      - name: Build Docker Image
        run: |
          docker build -t cc ./MLProject

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag model-estimasi ${{ secrets.DOCKER_HUB_USERNAME }}/model-estimasi:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/model-estimasi:latest
